<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>伦敦体系 · Stockfish 分支探索器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.ctn{max-width:1400px;margin:0 auto;padding:12px}
header{text-align:center;padding:10px 0}
header h1{font-size:22px;color:#f0c040}header p{color:#666;font-size:11px;margin-top:2px}
.hlinks{display:flex;justify-content:center;gap:12px;margin-top:6px}
.hlinks a{color:#4fc3f7;font-size:12px;text-decoration:none;padding:4px 12px;border:1px solid #2a3a5e;border-radius:6px;transition:all .2s}
.hlinks a:hover{border-color:#4fc3f7;background:rgba(79,195,247,.08)}
.nav{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.nb{padding:5px 11px;border:1px solid #2a3a5e;border-radius:6px;background:#16213e;color:#999;cursor:pointer;font-size:11px}
.nb:hover{border-color:#4a6a9e;color:#ddd}.nb.a{background:#1a3a6e;border-color:#4fc3f7;color:#4fc3f7;font-weight:600}
.main{display:grid;grid-template-columns:360px 1fr;gap:14px;margin-top:8px;align-items:start}
@media(max-width:900px){.main{grid-template-columns:1fr}}

/* Board */
.brd{display:grid;grid-template-columns:repeat(8,40px);grid-template-rows:repeat(8,40px);border:2px solid #555;border-radius:3px;position:relative}
.brd .s{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:28px;user-select:none}
.brd .s.l{background:#e8d5a8}.brd .s.d{background:#b58863}
.brd .s.lf{background:#aaa34e!important}.brd .s.lt{background:#cdd26a!important}
.brd .s.wp{color:#fff;text-shadow:0 0 3px rgba(0,0,0,.7)}.brd .s.bp{color:#1a1a1a}
.brd-o{position:relative;display:inline-block}
.asvg{position:absolute;top:0;left:0;width:320px;height:320px;pointer-events:none;z-index:5}
.cr{display:flex;justify-content:space-around;width:320px;padding-top:1px}.cr span{font-size:9px;color:#555;width:40px;text-align:center}
.cc{display:flex;flex-direction:column;justify-content:space-around;height:320px;padding-right:3px}.cc span{font-size:9px;color:#555;height:40px;display:flex;align-items:center}
.bg{display:flex;width:fit-content;margin:0 auto}
.ap{position:absolute;font-size:28px;z-index:10;pointer-events:none;transition:left .3s ease-out,top .3s ease-out}
.ap.wp{color:#fff;text-shadow:0 0 3px rgba(0,0,0,.7)}.ap.bp{color:#1a1a1a}

.ctrl{display:flex;justify-content:center;gap:4px;margin-top:6px}
.cb{width:34px;height:28px;border:1px solid #333;border-radius:4px;background:#16213e;color:#ccc;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}.cb:hover{background:#1e3050}
.si{text-align:center;margin-top:3px;font-size:10px;color:#666}
.ml{display:flex;flex-wrap:wrap;gap:1px;margin-top:5px;padding:5px;background:#111b2e;border-radius:5px;max-height:38px;overflow-y:auto}
.mi{padding:2px 5px;border-radius:3px;font-family:monospace;font-size:10px;cursor:pointer;color:#888}.mi:hover{background:#1e3050;color:#ddd}.mi.a{background:#1a3a6e;color:#f0c040;font-weight:700}

/* SF eval mini bar */
.sfm{background:#0d1520;border:1px solid #1e2d4d;border-radius:6px;padding:8px;margin-top:8px}
.sfm h4{font-size:11px;color:#ce93d8;margin-bottom:4px}
.evr{display:flex;align-items:center;gap:6px}
.evn{font-family:monospace;font-size:16px;font-weight:700;min-width:45px;text-align:right}
.evn.pos{color:#e8e8e8}.evn.neg{color:#666}.evn.ev{color:#aaa}
.ebo{flex:1;height:14px;background:#333;border-radius:7px;overflow:hidden}
.ebi{height:100%;background:linear-gradient(90deg,#e8e8e8,#ccc);border-radius:7px;transition:width .3s}
.scc{font-size:11px;color:#bbb;line-height:1.4;padding:6px;background:#111b2e;border-radius:5px;border-left:2px solid #ce93d8;margin-top:6px}

/* RIGHT: Branch explorer */
.rp{background:#16213e;border-radius:10px;padding:14px;min-height:400px}
.rp h2{color:#f0c040;font-size:16px;margin-bottom:3px}
.rp .sub{color:#666;font-size:11px;margin-bottom:10px}

/* Branch tabs */
.btabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.bt{padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #1e2d4d;background:#111b2e;transition:all .2s;font-family:monospace}
.bt:hover{border-color:#555}.bt.a{border-color:#ce93d8;background:rgba(206,147,216,.12);color:#ce93d8}
.bt .cp{font-size:9px;color:#888;margin-left:4px}
.bt.rank1{border-left:3px solid #4caf50}.bt.rank1.a{border-color:#4caf50;color:#4caf50}
.bt.worst{border-left:3px solid #ef5350}.bt.worst.a{border-color:#ef5350;color:#ef5350}

/* Branch board + timeline */
.bbrd-area{display:flex;gap:12px;align-items:start}
@media(max-width:900px){.bbrd-area{flex-direction:column}}
.bline{flex:1;min-width:0}
.bstep{padding:6px 8px;border-radius:5px;margin-bottom:3px;border:1px solid transparent;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:8px;transition:all .15s}
.bstep:hover{background:rgba(255,255,255,.03);border-color:#333}
.bstep.a{background:rgba(206,147,216,.08);border-color:#ce93d8}
.bstep.drop{background:rgba(239,83,80,.08);border-color:#ef5350}
.bstep .sn{font-family:monospace;font-weight:600;color:#f0c040;min-width:45px}
.bstep .cv{font-family:monospace;font-size:10px;min-width:50px}
.bstep .cv.pos{color:#4caf50}.bstep .cv.neg{color:#ef5350}.bstep .cv.ev{color:#888}
.bstep .bar{flex:1;height:6px;background:#222;border-radius:3px;overflow:hidden}
.bstep .bar div{height:100%;border-radius:3px;transition:width .3s}
.bstep .tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.bstep .tag.best{background:rgba(76,175,80,.15);color:#4caf50}
.bstep .tag.drop{background:rgba(239,83,80,.15);color:#ef5350}

/* Step comment in the right panel */
.rsc{background:#0d1520;border:1px solid #1e2d4d;border-radius:6px;padding:10px;margin-top:10px}
.rsc .ml{font-family:monospace;color:#f0c040;font-weight:700;font-size:12px}
.rsc .ct{color:#bbb;font-size:11px;margin-top:3px;line-height:1.4}

.bscroll-hint{text-align:center;font-size:10px;color:#555;margin-top:6px}

/* White move tips */
.wtips{background:#0d1520;border:1px solid #1e2d4d;border-radius:8px;padding:10px;margin-top:10px}
.wtips h4{font-size:12px;color:#f0c040;margin-bottom:6px}
.wtip{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;margin-bottom:3px;font-size:11px}
.wtip.blunder{background:rgba(239,83,80,.1);border-left:3px solid #ef5350}
.wtip.blunder .icon{color:#ef5350}
.wtip.mistake{background:rgba(255,152,0,.08);border-left:3px solid #ffa726}
.wtip.mistake .icon{color:#ffa726}
.wtip.best{background:rgba(76,175,80,.08);border-left:3px solid #4caf50}
.wtip.best .icon{color:#4caf50}
.wtip .mv{font-family:monospace;font-weight:600;min-width:40px}
.wtip .loss{font-family:monospace;font-size:10px;color:#888;min-width:55px}
.wtip .why{color:#bbb;font-size:10px;flex:1}
.wtips-sum{font-size:11px;color:#888;margin-top:6px;padding:6px;background:#111b2e;border-radius:4px}


.btips{background:#0d1520;border:1px solid #1e2d4d;border-radius:8px;padding:10px;margin-top:10px}
.btips h4{font-size:12px;color:#42a5f5;margin-bottom:6px}
.btip{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;margin-bottom:3px;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.btip:hover{background:rgba(66,165,245,.06);border-color:#2a3a5e}
.btip.active{background:rgba(66,165,245,.1);border-color:#42a5f5}
.btip .rank{color:#42a5f5;font-weight:700;min-width:16px}
.btip .mv{font-family:monospace;font-weight:600;color:#f0c040;min-width:42px}
.btip .cv{font-family:monospace;font-size:10px;min-width:45px}
.btip .cv.good{color:#4caf50}.btip .cv.bad{color:#ef5350}.btip .cv.ok{color:#888}
.btip .resp{color:#ce93d8;font-size:10px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btips-note{font-size:10px;color:#555;margin-top:5px}
</style></head><body><div class="ctn">

function updBtips(vk, mainStep) {
  const bmVar = BM[vk];
  if (!bmVar) { document.getElementById('btips').style.display='none'; return; }
  const bmStep = bmVar.find(s => s.step === mainStep);
  if (!bmStep) { document.getElementById('btips').style.display='none'; return; }
  document.getElementById('btips').style.display='';
  // Hide white tips on black's turn
  document.getElementById('wtips').style.display='none';
  
  const opts = bmStep.opts || [];
  let h = '';
  opts.forEach((o, i) => {
    const cv = o.c;
    const cvClass = cv > 20 ? 'good' : cv < -20 ? 'bad' : 'ok';
    const cvStr = (cv >= 0 ? '+' : '') + (cv/100).toFixed(2);
    // Show first 3 moves of white's response
    const respStr = o.l.slice(0, 3).map(p => p.s).join(' ');
    h += `<div class="btip" onclick="showBlackOpt(${i})">`;
    h += `<span class="rank">${i+1}</span>`;
    h += `<span class="mv">...${o.s}</span>`;
    h += `<span class="cv ${cvClass}">${cvStr}</span>`;
    h += `<span class="resp">→ ${respStr}</span>`;
    h += `</div>`;
  });
  document.getElementById('btipsContent').innerHTML = h || '<div style="color:#555;font-size:11px">无黑方数据</div>';
}

var curBlackOpt = -1;
function showBlackOpt(idx) {
  curBlackOpt = idx;
  const bmVar = BM[V[curV].sk];
  if (!bmVar) return;
  const bmStep = bmVar.find(s => s.step === curS);
  if (!bmStep) return;
  const o = bmStep.opts[idx];
  if (!o) return;
  
  // Highlight active
  document.querySelectorAll('#btipsContent .btip').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  
  // Show response line in bline
  const bl = document.getElementById('bline');
  let h = `<div class="bstep a"><span class="sn">...${o.s}</span><span class="cv ${o.c>20?'pos':o.c<-20?'neg':'ev'}">${(o.c/100).toFixed(2)}</span><div class="bar"><div style="width:${Math.min(100,Math.max(0,50+o.c/6))}%;background:${o.c>0?'#4caf50':'#ef5350'}"></div></div></div>`;
  
  o.l.forEach((p, i) => {
    const isWhite = i % 2 === 0; // first response is white's
    h += `<div class="bstep" onclick="showBlackStep(${idx},${i})" style="cursor:pointer">`;
    h += `<span class="sn">${isWhite ? '♔' : '♚'} ${p.s}</span>`;
    h += `<span class="cv ${p.c>20?'pos':p.c<-20?'neg':'ev'}">${(p.c/100).toFixed(2)}</span>`;
    h += `<div class="bar"><div style="width:${Math.min(100,Math.max(0,50+p.c/6))}%;background:${p.c>0?'#4caf50':'#ef5350'}"></div></div>`;
    h += `</div>`;
  });
  bl.innerHTML = h;
  
  // Show explanation
  const respMoves = o.l.slice(0, 3).map(p => p.s).join(' → ');
  const finalCp = o.l.length > 0 ? o.l[o.l.length-1].c : o.c;
  let explain = `黑方走 ...${o.s}（评分 ${(o.c/100).toFixed(2)}）\n\n`;
  explain += `你的最佳应对序列：${respMoves}\n\n`;
  if (finalCp > 30) explain += `✅ 应对后白方保持优势（${(finalCp/100).toFixed(2)}），这条线对你有利。`;
  else if (finalCp > -30) explain += `⚖️ 应对后局面接近均势（${(finalCp/100).toFixed(2)}），需要继续精确操作。`;
  else explain += `⚠️ 这是黑方的强手，即使最佳应对后白方略亏（${(finalCp/100).toFixed(2)}）。`;
  
  document.getElementById('rsc').innerHTML = `<div class="ml">黑方 ...${o.s} → 白方应对</div><div class="ct">${explain.replace(/\n/g,'<br>')}</div>`;
  
  // Show first position on branch board
  if (o.l.length > 0) dB('bb', o.l[0].f, '', '');
  
  // Reset branch scroll position
  curBrBlackStep = -1;
}

var curBrBlackStep = -1;
function showBlackStep(optIdx, lineIdx) {
  const bmVar = BM[V[curV].sk];
  if (!bmVar) return;
  const bmStep = bmVar.find(s => s.step === curS);
  if (!bmStep) return;
  const o = bmStep.opts[optIdx];
  if (!o || !o.l[lineIdx]) return;
  
  dB('bb', o.l[lineIdx].f, '', '');
  curBrBlackStep = lineIdx;
  
  document.querySelectorAll('#bline .bstep').forEach((el, i) => {
    el.classList.toggle('a', i === lineIdx + 1);
  });
}

function updWtips(vk, mainStep) {
  const wmVar = WM[vk];
  if (!wmVar) { document.getElementById('wtips').style.display='none'; return; }
  const wmStep = wmVar.find(s => s.step === mainStep);
  if (!wmStep) { document.getElementById('wtips').style.display='none'; return; }
  document.getElementById('wtips').style.display='';
  
  const bests = wmStep.bests || [];
  const subs = wmStep.sub || [];
  
  let h = '';
  
  // Best moves (green)
  bests.forEach(m => {
    h += `<div class="wtip best"><span class="icon">✅</span><span class="mv">${m.s}</span><span class="loss">${(m.c/100).toFixed(2)}</span><span class="why">坚持这步！最佳或接近最佳</span></div>`;
  });
  
  // Subtle mistakes - the main focus
  subs.forEach((sm, idx) => {
    const loss = sm.loss / 100;
    let cls, icon, label;
    
    if (sm.tag === 'subtle') {
      cls = 'mistake'; icon = '🟡'; 
      label = `微妙失准 -${loss.toFixed(2)}`;
    } else if (sm.tag === 'inaccuracy') {
      cls = 'mistake'; icon = '🟠';
      label = `计算陷阱 -${loss.toFixed(2)}`;
    } else {
      cls = 'blunder'; icon = '🔴';
      label = `严重隐患 -${loss.toFixed(2)}`;
    }
    
    // Generate why text based on consequence
    let why = '';
    const totalLoss = sm.tl / 100;
    const worstAt = sm.wi + 1;
    if (totalLoss > 1.5) {
      why = `${worstAt}步后可能丢子（累计-${totalLoss.toFixed(1)}）`;
    } else if (totalLoss > 0.8) {
      why = `${worstAt}步后可能丢兵（累计-${totalLoss.toFixed(1)}）`;
    } else if (totalLoss > 0.3) {
      why = `逐渐失去位置优势（${worstAt}步后-${totalLoss.toFixed(1)}）`;
    } else {
      why = `微小但持续的劣势`;
    }
    
    // Make it clickable to show in branch explorer
    h += `<div class="wtip ${cls}" onclick="showSubtle(${idx})" style="cursor:pointer">`;
    h += `<span class="icon">${icon}</span>`;
    h += `<span class="mv">${sm.s}</span>`;
    h += `<span class="loss">${label}</span>`;
    h += `<span class="why">${why} ▶</span>`;
    h += `</div>`;
  });
  
  document.getElementById('wtipsContent').innerHTML = h || '<div style="color:#555;font-size:11px">此步无白方决策</div>';
  
  const total = subs.length;
  const yellows = subs.filter(s=>s.tag==='subtle').length;
  const oranges = subs.filter(s=>s.tag==='inaccuracy').length;
  const reds = subs.filter(s=>s.tag==='serious').length;
  document.getElementById('wtipsSum').textContent = total > 0 
    ? `${total}个隐患棋：${yellows}个微妙失准 · ${oranges}个计算陷阱 · ${reds}个严重隐患　点击查看后果 ▶`
    : '此步白方走法明确';
}

// When clicking a subtle mistake, show its consequence line in the branch board
function showSubtle(idx) {
  const wmVar = WM[V[curV].sk];
  if (!wmVar) return;
  const wmStep = wmVar.find(s => s.step === curS);
  if (!wmStep) return;
  const sm = wmStep.sub[idx];
  if (!sm || !sm.l) return;
  
  // Update rsc with the consequence explanation
  const line = sm.l;
  let tag = sm.tag === 'subtle' ? '🟡 微妙失准' : sm.tag === 'inaccuracy' ? '🟠 计算陷阱' : '🔴 严重隐患';
  let explain = `如果走 ${sm.s}（评分 ${(sm.c/100).toFixed(2)}，比最佳差 ${(sm.loss/100).toFixed(2)}）：\n\n`;
  explain += `接下来的最佳应对序列：\n`;
  line.forEach((p, i) => {
    const marker = i === sm.wi ? ' ← ⚠️最大丢分点' : '';
    explain += `  ${i+1}. ${p.s}（${(p.c/100).toFixed(2)}）${marker}\n`;
  });
  explain += `\n最终评分降到 ${(sm.wc/100).toFixed(2)}，累计丢分 ${(sm.tl/100).toFixed(1)}`;
  
  document.getElementById('rsc').innerHTML = `<div class="ml">${tag} · ${sm.s}</div><div class="ct">${explain.replace(/\n/g,'<br>')}</div>`;
  
  // Show the worst position on the branch board
  if (sm.wi >= 0 && line[sm.wi]) {
    dB('bb', line[sm.wi].f, '', '');
  } else if (line.length > 0) {
    dB('bb', line[line.length-1].f, '', '');
  }
  
  // Build step list in bline
  const bl = document.getElementById('bline');
  let blh = `<div class="bstep a"><span class="sn">${sm.s}</span><span class="cv ${sm.c>0?'pos':'neg'}">${(sm.c/100).toFixed(2)}</span><div class="bar"><div style="width:${Math.min(100,Math.max(0,50+sm.c/6))}%;background:${sm.c>0?'#4caf50':'#ef5350'}"></div></div><span class="tag drop">-${(sm.loss/100).toFixed(2)}</span></div>`;
  
  line.forEach((p, i) => {
    const isDrop = i === sm.wi;
    blh += `<div class="bstep${isDrop?' drop':''}" onclick="showSubStep(${idx},${i})" style="cursor:pointer">`;
    blh += `<span class="sn">${p.s}</span>`;
    blh += `<span class="cv ${p.c>20?'pos':p.c<-20?'neg':'ev'}">${(p.c/100).toFixed(2)}</span>`;
    blh += `<div class="bar"><div style="width:${Math.min(100,Math.max(0,50+p.c/6))}%;background:${p.c>0?'#4caf50':'#ef5350'}"></div></div>`;
    if(isDrop) blh += `<span class="tag drop">⚠️丢分</span>`;
    blh += `</div>`;
  });
  bl.innerHTML = blh;
}

let curV='classical',curS=0,curBr=0,curBrS=-1,anim=false;

function c2xy(c){return{x:(c.charCodeAt(0)-97)*SZ+SZ/2,y:(8-+c[1])*SZ+SZ/2}}
function pF(f){const R=f.split('/'),b=[];for(const r of R){const a=[];for(const c of r)if(c>='1'&&c<='8')for(let i=0;i<+c;i++)a.push('');else a.push(c);b.push(a);}return b;}

function dB(id,fen,fs,ts){
  const b=pF(fen),el=document.getElementById(id);el.innerHTML='';
  for(let r=0;r<8;r++)for(let f=0;f<8;f++){
    const sq=document.createElement('div');sq.className='s '+((r+f)%2===0?'l':'d');
    const co=String.fromCharCode(97+f)+(8-r);
    if(fs&&co===fs)sq.classList.add('lf');if(ts&&co===ts)sq.classList.add('lt');
    const pc=b[r][f];if(pc){sq.textContent=P[pc]||'';sq.classList.add(WP.has(pc)?'wp':'bp');}
    el.appendChild(sq);
  }
}

function drawArrowsOn(svgId, arrows, markerSuffix){
  const svg=document.getElementById(svgId);if(!svg)return;
  const defs=svg.querySelector('defs');svg.innerHTML='';svg.appendChild(defs);
  const cols={green:'#4caf50',red:'#ef5350',orange:'#ffa726',blue:'#42a5f5',purple:'#ce93d8'};
  const sfx=markerSuffix||'';
  const mids={green:'ag'+sfx,red:'ar'+sfx,orange:'ao'+sfx,blue:'ab'+sfx,purple:'ap'+sfx};
  for(const a of arrows){
    const p1=c2xy(a.from),p2=c2xy(a.to),dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy);
    if(len<1)continue;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',p1.x+dx/len*5);l.setAttribute('y1',p1.y+dy/len*5);
    l.setAttribute('x2',p2.x-dx/len*8);l.setAttribute('y2',p2.y-dy/len*8);
    l.setAttribute('stroke',cols[a.color]||'#888');
    l.setAttribute('stroke-width',a.color==='purple'?'6':'4');
    l.setAttribute('stroke-linecap','round');l.setAttribute('opacity','0.7');
    l.setAttribute('marker-end','url(#'+mids[a.color]+')');
    svg.appendChild(l);
  }
}
function dA(arrows){ drawArrowsOn('asvg', arrows, ''); }
function dA2(arrows){ drawArrowsOn('asvg2', arrows, '2'); }

// Generate intent arrows for a branch move based on from/to squares and eval change
function branchArrows(fromSq, toSq, cp, prevCp, isWhiteMove) {
  const arrows = [];
  if (!fromSq || !toSq) return arrows;
  // The move itself as purple (SF recommended line)
  arrows.push({from: fromSq, to: toSq, color: 'purple'});
  // Analyze intent based on eval change
  const delta = cp - prevCp;
  if (isWhiteMove) {
    if (delta > 15) {
      // White improving = attack/control
      arrows.push({from: toSq, to: guessTarget(toSq, true), color: 'green'});
    } else if (delta < -15) {
      // White worsening = weakness exposed
      arrows.push({from: toSq, to: guessTarget(toSq, false), color: 'orange'});
    }
  } else {
    if (delta < -15) {
      // Black improving (cp drops) = black attacking
      arrows.push({from: toSq, to: guessTarget(toSq, true), color: 'red'});
    } else if (delta > 15) {
      // Black worsening = black exposed weakness
      arrows.push({from: toSq, to: guessTarget(toSq, false), color: 'orange'});
    }
  }
  return arrows;
}

// Guess a target square based on piece location (simple heuristic for visual arrows)
function guessTarget(sq, attacking) {
  const f = sq.charCodeAt(0) - 97; // 0-7
  const r = parseInt(sq[1]); // 1-8
  if (attacking) {
    // Point toward opponent's king area
    if (r <= 4) return String.fromCharCode(97 + Math.min(7, f+1)) + Math.min(8, r+2); // black attacking upward
    else return String.fromCharCode(97 + Math.min(7, f)) + Math.max(1, r-2); // white attacking downward
  } else {
    // Point backward (retreat direction)
    if (r <= 4) return String.fromCharCode(97 + f) + Math.max(1, r-1);
    else return String.fromCharCode(97 + f) + Math.min(8, r+1);
  }
}

function animMv(step,dir,cb){
  if(!step.f||!step.t||dir!==1){cb();return;}
  const nb=pF(step.fen),tr=8-+step.t[1],tc=step.t.charCodeAt(0)-97,pc=nb[tr][tc];
  if(!pc){cb();return;}
  // render without the moved piece
  const el=document.getElementById('board');el.innerHTML='';
  for(let r=0;r<8;r++)for(let f=0;f<8;f++){
    const sq=document.createElement('div');sq.className='s '+((r+f)%2===0?'l':'d');
    const co=String.fromCharCode(97+f)+(8-r);
    if(co===step.f)sq.classList.add('lf');if(co===step.t)sq.classList.add('lt');
    const p2=nb[r][f];if(p2&&co!==step.t){sq.textContent=P[p2]||'';sq.classList.add(WP.has(p2)?'wp':'bp');}
    el.appendChild(sq);
  }
  const bo=document.querySelector('.brd-o'),fp=document.createElement('div');
  fp.className='ap '+(WP.has(pc)?'wp':'bp');fp.textContent=P[pc];

  bo.appendChild(fp);fp.offsetHeight;fp.style.left=(tc*SZ+2)+'px';fp.style.top=(tr*SZ+2)+'px';
  setTimeout(()=>{fp.remove();cb();},300);
}

function updSF(vk,idx){
  const sfV=SF[vk];if(!sfV||!sfV[idx])return;
  const s=sfV[idx],cp=s.c;
  const el=document.getElementById('evn');
  el.textContent=(cp>=0?'+':'')+(cp/100).toFixed(2);
  el.className='evn '+(cp>30?'pos':cp<-30?'neg':'ev');
  document.getElementById('ebar').style.width=Math.min(95,Math.max(5,50+cp/8))+'%';
  
  // Comment
  const v=V[curV],next=v.mv[idx+1];
  const branches=s.b||[];
  let cmt='';
  if(next&&branches.length>0){
    const played=next.m.replace(/^\d+\.\.\.\s*/,'').replace(/^\d+\.\s*/,'').replace(/[!?]+$/,'').trim();
    const best=branches[0].s;
    if(played===best)cmt=`✅ ${played} 与 SF 一致`;
    else{
      const found=branches.find(b=>b.s===played);
      if(found)cmt=`⚠️ ${played} 在 SF 前${branches.indexOf(found)+1}（差${((branches[0].c-found.c)/100).toFixed(2)}）。SF首选 ${best}`;
      else cmt=`🔀 偏离：伦敦走 ${played}，SF首选 ${best}`;
      if(best==='c4')cmt+=' · SF偏好c4转Queen\'s Gambit';
      else if(best==='Nf3'&&played!=='Nf3')cmt+=' · SF偏好先Nf3最大灵活性';
      else if(best==='Ne5')cmt+=' · SF推荐Ne5前哨站';
    }
  }
  document.getElementById('scc').textContent=cmt||'翻步查看分析';
}

function updBranches(vk,idx){
  const sfV=SF[vk];
  const tabs=document.getElementById('btabs');tabs.innerHTML='';
  
  // Check if it's black's turn
  const isBlack = sfV && sfV[idx] && sfV[idx].t === 'b';
  
  if (isBlack) {
    // BLACK'S TURN: show black's options + white's response
    const bmVar = BM[vk];
    const bmStep = bmVar ? bmVar.find(s => s.step === idx) : null;
    const opts = bmStep ? bmStep.opts || [] : [];
    
    if (opts.length === 0) {
      document.getElementById('bline').innerHTML='<div style="color:#555;font-size:11px">无数据</div>';
      return;
    }
    
    opts.forEach((o, i) => {
      const t = document.createElement('div');
      const cv = (o.c/100).toFixed(2);
      let cls = 'bt';
      if (i === 0) cls += ' rank1';
      if (i === curBr) cls += ' a';
      t.className = cls;
      t.innerHTML = `♚ ...${o.s}<span class="cp">${o.c>=0?'+':''}${cv}</span>`;
      t.onclick = () => { curBr=i; curBrS=-1; rpScrollStep=0; updBranches(vk,idx); renderBlackBranch(opts[i]); };
      tabs.appendChild(t);
    });
    
    renderBlackBranch(opts[curBr]);
    return;
  }
  
  // WHITE'S TURN: merge SF top branches + subtle mistakes
  const branches = (sfV && sfV[idx]) ? sfV[idx].b || [] : [];
  const wmVar = WM[vk];
  const wmStep = wmVar ? wmVar.find(s => s.step === idx) : null;
  const bests = wmStep ? wmStep.bests || [] : [];
  const subs = wmStep ? wmStep.sub || [] : [];
  
  // Build unified tab list: SF best moves + subtle mistakes
  // First: SF top moves as green/normal tabs
  let allTabs = [];
  branches.forEach((b, i) => {
    allTabs.push({type:'sf', idx:i, san:b.s, cp:b.c, rank:i});
  });
  
  // Add subtle mistakes that aren't already in SF top (avoid duplicates)
  const sfSans = new Set(branches.map(b => b.s));
  subs.forEach((sm, i) => {
    if (!sfSans.has(sm.s)) {
      allTabs.push({type:'subtle', idx:i, san:sm.s, cp:sm.c, loss:sm.loss, tag:sm.tag});
    }
  });
  
  if (allTabs.length === 0) {
    document.getElementById('bline').innerHTML='<div style="color:#555;font-size:11px">无数据</div>';
    return;
  }
  
  allTabs.forEach((item, i) => {
    const t = document.createElement('div');
    const cv = (item.cp/100).toFixed(2);
    let cls = 'bt';
    
    if (item.type === 'sf') {
      if (item.rank === 0) cls += ' rank1';
      if (i === curBr) cls += ' a';
      t.innerHTML = `${item.rank===0?'🐟 ':''}${item.san}<span class="cp">${item.cp>=0?'+':''}${cv}</span>`;
    } else {
      // Subtle mistake tab
      cls += ' worst';
      if (i === curBr) cls += ' a';
      const icon = item.tag==='subtle'?'🟡':item.tag==='inaccuracy'?'🟠':'🔴';
      t.innerHTML = `${icon} ${item.san}<span class="cp">-${(item.loss/100).toFixed(2)}</span>`;
    }
    
    t.className = cls;
    t.onclick = () => {
      curBr = i;
      curBrS = -1;
      rpScrollStep = -1;
      updBranches(vk, idx);
      if (item.type === 'sf') {
        renderBranch();
      } else {
        renderSubtleBranch(item.idx);
      }
    };
    tabs.appendChild(t);
  });
  
  // Render the selected tab
  const sel = allTabs[curBr];
  if (!sel) return;
  if (sel.type === 'sf') renderBranch();
  else renderSubtleBranch(sel.idx);
}

function renderBlackBranch(opt) {
  if (!opt) return;
  const line = opt.l || [];
  
  const bl = document.getElementById('bline');
  let h = `<div class="bstep a"><span class="sn">♚ ...${opt.s}</span><span class="cv ${opt.c>20?'pos':opt.c<-20?'neg':'ev'}">${(opt.c/100).toFixed(2)}</span><div class="bar"><div style="width:${Math.min(100,Math.max(0,50+opt.c/6))}%;background:${opt.c>0?'#4caf50':'#ef5350'}"></div></div></div>`;
  
  line.forEach((p, i) => {
    const isW = i % 2 === 0;
    h += `<div class="bstep" onclick="showBBS(${i})" style="cursor:pointer">`;
    h += `<span class="sn">${isW?'♔':'♚'} ${p.s}</span>`;
    h += `<span class="cv ${p.c>20?'pos':p.c<-20?'neg':'ev'}">${(p.c/100).toFixed(2)}</span>`;
    h += `<div class="bar"><div style="width:${Math.min(100,Math.max(0,50+p.c/6))}%;background:${p.c>0?'#4caf50':'#ef5350'}"></div></div>`;
    h += `</div>`;
  });
  bl.innerHTML = h;
  
  // Show on branch board
  if (line.length > 0) dB('bb', line[0].f, '', '');
  
  // Explain
  const respStr = line.slice(0,3).map(p=>p.s).join(' → ');
  const finalCp = line.length > 0 ? line[line.length-1].c : opt.c;
  let ex = `黑方走 ...${opt.s}（${(opt.c/100).toFixed(2)}）\n\n你的最佳应对：${respStr}\n\n`;
  if (finalCp > 30) ex += `✅ 应对后白方保持优势（${(finalCp/100).toFixed(2)}）`;
  else if (finalCp > -30) ex += `⚖️ 应对后接近均势（${(finalCp/100).toFixed(2)}）`;
  else ex += `⚠️ 黑方强手，白方需精确操作（${(finalCp/100).toFixed(2)}）`;
  document.getElementById('rsc').innerHTML = `<div class="ml">♚ ...${opt.s} → ♔ 应对</div><div class="ct">${ex.replace(/\n/g,'<br>')}</div>`;
  
  curBlackOpt = curBr;
  curBrBlackStep = -1;
}

function renderSubtleBranch(subIdx) {
  const wmVar = WM[V[curV].sk];

  let why = totalLoss>1.5?`${sm.wi+1}步后可能丢子`:totalLoss>0.8?`${sm.wi+1}步后可能丢兵`:`逐渐失去位置优势`;

function renderBranch(){
  const sfV=SF[V[curV].sk];if(!sfV||!sfV[curS])return;
  const branches=sfV[curS].b||[];
  const br=branches[curBr];if(!br)return;

  h+=`<span class="sn">当前局面</span>`;
  h+=`<span class="cv ${startCp>20?'pos':startCp<-20?'neg':'ev'}">${cpStr}</span>`;
  h+=`<div class="bar"><div style="width:${Math.min(100,Math.max(0,50+startCp/6))}%;background:${startCp>0?'#4caf50':'#ef5350'}"></div></div>`;
  h+=`</div>`;

  h+=`<div class="bstep${rpScrollStep===1?' a':''}" onclick="goBrS(1)">`;
  h+=`<span class="sn">${br.s}</span>`;
  h+=`<span class="cv ${startCp>20?'pos':startCp<-20?'neg':'ev'}">${cpStr}</span>`;
  h+=`<div class="bar"><div style="width:${Math.min(100,Math.max(0,50+startCp/6))}%;background:${startCp>0?'#4caf50':'#ef5350'}"></div></div>`;

    h+=`<span class="sn">${p.s}</span>`;

    h+=`<span class="cv ${p.c>20?'pos':p.c<-20?'neg':'ev'}">${cv}</span>`;
    h+=`<div class="bar"><div style="width:${Math.min(100,Math.max(0,50+p.c/6))}%;background:${p.c>0?'#4caf50':'#ef5350'}"></div></div>`;
    if(isDrop)h+=`<span class="tag drop">丢分↓${(br.wd/100).toFixed(1)}</span>`;
    h+=`</div>`;
  });
  bl.innerHTML=h;

  // Render right board based on rpScrollStep
  if(rpScrollStep <= 0){
    // Step 0: same as left board
    const step=V[curV].mv[curS];
    dB('bb',step.fen,step.f,step.t);
    // Draw same arrows as left board + SF best arrow
    let arrows=[...(step.a||[])];

    dA2(arrows);
    document.getElementById('rsc').innerHTML=`<div class="ml">当前局面 · 🐟推荐 ${br.s} (${cpStr})</div><div class="ct">与左侧棋盘同步。向下滚轮查看 ${br.s} 之后的发展。\n\n🟢控制 🔴攻击 🟠弱点 🔵计划 🟣SF最佳</div>`;

    // Step 1: after the branch move, show on the board
    if(line.length > 0){
      dB('bb',line[0].f,'','');
      const arrows = branchArrows(br.fr, br.to, line[0].c, startCp, sfV[curS].t==='w');
      dA2(arrows);
    } else {
      const step=V[curV].mv[curS];
      dB('bb',step.fen,step.f,step.t);

  } else {

    if(line[lineIdx]){
      dB('bb',line[lineIdx].f,'','');
      // Draw intent arrows
      const prevCp = lineIdx > 0 ? line[lineIdx-1].c : startCp;
      const isWhite = lineIdx % 2 === (sfV[curS].t==='w' ? 1 : 0);
      const arrows = branchArrows('','', line[lineIdx].c, prevCp, isWhite);
      // Also add SF best move arrow if available from branches
      if(br.fr&&br.to) arrows.push({from:br.fr,to:br.to,color:'blue'});
      dA2(arrows.filter(a=>a.from&&a.to));

      const p=line[lineIdx];
      const cv=(p.c>=0?'+':'')+(p.c/100).toFixed(2);
      const isDrop=lineIdx===br.wi&&br.wd>30;
      let explain=`第 ${lineIdx+1} 步续招：${p.s}　评分：${cv}`;
      if(isDrop)explain+=`\n\n⚠️ 关键转折！评分变化 ${(br.wd/100).toFixed(1)}。`;
      if(p.c > prevCp + 20) explain+=`\n🟢 白方改善了局面`;
      else if(p.c < prevCp - 20) explain+=`\n🔴 黑方获得了优势`;
      document.getElementById('rsc').innerHTML=`<div class="ml">${p.s}　${cv}</div><div class="ct">${explain.replace(/\n/g,'<br>')}</div>`;
    }
  }

  // Highlight active step
  document.querySelectorAll('#bline .bstep').forEach((el,i)=>el.classList.toggle('a',i===rpScrollStep));
}

function goBrS(i){rpScrollStep=i;renderBranch();}

function renderStep(dir){
  const v=V[curV],step=v.mv[curS];
  const doRender=()=>{
    dB('board',step.fen,step.f,step.t);
    let arrows=[...(step.a||[])];
    // Add SF best move arrow (purple)
    const sfV=SF[v.sk];
    if(sfV&&sfV[curS]&&sfV[curS].b&&sfV[curS].b[0]&&sfV[curS].b[0].fr)
      arrows.push({from:sfV[curS].b[0].fr,to:sfV[curS].b[0].to,color:'purple'});
    dA(arrows);
    updSF(v.sk,curS);
    curBr=0;curBrS=-1;rpScrollStep=0;
    updBranches(v.sk,curS);
    // tips merged into branches
  };
  if(dir===1&&step.f&&step.t&&!anim){anim=true;animMv(step,dir,()=>{doRender();anim=false;});}
  else if(!anim)doRender();
  document.getElementById('si').textContent=`${curS}/${v.mv.length-1}`;
  document.querySelectorAll('.mi').forEach((it,i)=>{it.classList.toggle('a',i+1===curS);});
}

function goN(){if(anim)return;if(curS<V[curV].mv.length-1){curS++;renderStep(1);}}
function goP(){if(anim)return;if(curS>0){curS--;renderStep(-1);}}
function goF(){if(anim)return;curS=0;renderStep(0);}
function goL(){if(anim)return;curS=V[curV].mv.length-1;renderStep(0);}

function init(){
  const nav=document.getElementById('varNav');nav.innerHTML='';
  for(const[k,v]of Object.entries(V)){const b=document.createElement('div');b.className='nb'+(k===curV?' a':'');b.textContent=v.n;b.onclick=()=>loadV(k);nav.appendChild(b);}
  loadV(curV);
}

function loadV(k){
  curV=k;curS=0;curBr=0;curBrS=-1;rpScrollStep=0;
  document.querySelectorAll('.nb').forEach((b,i)=>{b.classList.toggle('a',Object.keys(V)[i]===k);});
  const ml=document.getElementById('ml');ml.innerHTML='';
  V[k].mv.forEach((m,i)=>{if(!i)return;const it=document.createElement('span');it.className='mi';it.textContent=m.m;it.onclick=()=>{curS=i;renderStep(0);};ml.appendChild(it);});
  renderStep(0);
}

// Keyboard + scroll
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goN();if(e.key==='ArrowLeft')goP();});
document.querySelector('.board-area')?.addEventListener('wheel',e=>{e.preventDefault();e.deltaY>0?goN():goP();},{passive:false});

// RIGHT panel scroll = unified branch scroll (works for SF branches, subtle mistakes, and black responses)
var rpScrollStep = 0; // tracks current scroll position in the right panel timeline (0 = first step)

document.getElementById('rp')?.addEventListener('wheel',e=>{
  e.preventDefault();
  const sfV = SF[V[curV].sk];
  const isBlack = sfV && sfV[curS] && sfV[curS].t === 'b';

  if (isBlack) {
    // BLACK TURN: scroll through selected black option's response line
    const bmVar = BM[V[curV].sk];
    if (!bmVar) return;
    const bmStep = bmVar.find(s => s.step === curS);
    if (!bmStep || !bmStep.opts[curBr]) return;
    const line = bmStep.opts[curBr].l || [];
    if (line.length === 0) return;

    if (e.deltaY > 0) {
      // scroll down: advance one step, max = last step
      if (rpScrollStep < line.length - 1) { rpScrollStep++; showBBS(rpScrollStep); }
    } else {
      // scroll up: go back one step, but clamp at 0 (first step), never go below
      if (rpScrollStep > 0) { rpScrollStep--; showBBS(rpScrollStep); }
      // at 0 or -1: do nothing, stay on first step
    }
    return;
  }

  // WHITE TURN: figure out what's currently selected
  const allTabs = document.querySelectorAll('#btabs .bt');
  if (allTabs.length === 0) return;

  const activeTab = allTabs[curBr];
  const isSubtle = activeTab && activeTab.textContent.match(/[🟡🟠🔴]/);

  if (isSubtle) {
    // Scrolling through a subtle mistake's consequence line
    const wmVar = WM[V[curV].sk];
    if (!wmVar) return;
    const wmStep = wmVar.find(s => s.step === curS);
    if (!wmStep) return;
    const sfBranches = (sfV && sfV[curS]) ? sfV[curS].b || [] : [];
    let subtleIdx = 0;
    let count = 0;
    for (let i = 0; i < curBr; i++) {
      const t = allTabs[i];
      if (t && t.textContent.match(/[🟡🟠🔴]/)) count++;
    }
    subtleIdx = count;

    const sm = wmStep.sub[subtleIdx];
    if (!sm || !sm.l) return;
    const line = sm.l;

    if (e.deltaY > 0) {
      if (rpScrollStep < line.length - 1) { rpScrollStep++; showSSt(subtleIdx, rpScrollStep); }
    } else {
      if (rpScrollStep > 0) { rpScrollStep--; showSSt(subtleIdx, rpScrollStep); }
      // at 0 or below: do nothing, stay on first step
    }
  } else {
    // Scrolling through SF branch — now uses renderBranch() which handles arrows + step 0
    if (!sfV || !sfV[curS]) return;
    const br = sfV[curS].b?.[curBr];
    if (!br || !br.l) return;
    const maxS = br.l.length + 1; // step 0=current, 1=branch move, 2..N+1=continuation

    if (e.deltaY > 0) {
      if (rpScrollStep < maxS) { rpScrollStep++; renderBranch(); }
    } else {
      if (rpScrollStep > 0) { rpScrollStep--; renderBranch(); }
    }
  }
},{passive:false});

init();
</script></body></html>
